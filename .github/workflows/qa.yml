name: Automated QA

# Two ways to trigger this:
#
# 1. workflow_dispatch — pick a scenario from the Actions tab. Best for demos
#    and ad-hoc reruns.
#
# 2. pull_request — opens automatically on PRs that touch scenario or service
#    files. Maps the changed paths to the right scenario and agent.
#
# Both paths produce the same outputs: a GitHub Actions artifact bundle you
# can download, plus a PR comment (when triggered by a PR) linking to the
# artifact and the OpenHands conversation.

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Which scenario to run
        required: true
        type: choice
        options:
          - scenarios/01_api_pr_update
          - scenarios/02_api_new_generation
          - scenarios/03_ui_workflow
  pull_request:
    paths:
      - 'scenarios/**'
      - 'skills/**'
      - 'AGENTS.md'
      # Belt-and-suspenders alongside [skip ci] in the auto-commit message:
      # the workflow itself pushes preview GIFs back to the PR branch.
      # The leading '!' excludes these files from triggering the workflow
      # even though they live under scenarios/**.
      - '!scenarios/*/recordings/preview-*.gif'

jobs:
  qa:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # to push the preview GIF back to the PR branch
      pull-requests: write   # to post comments
    steps:
      - name: Check out PR / branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install client-side deps
        run: pip install httpx python-dotenv

      # -----------------------------------------------------------------
      # Pick which scenario to run.
      # - workflow_dispatch: use the input value directly.
      # - pull_request: choose the most-changed scenario folder, falling
      #   back to scenarios/01_api_pr_update if nothing matches.
      # -----------------------------------------------------------------
      - name: Decide scenario
        id: scenario
        env:
          INPUT_SCENARIO: ${{ inputs.scenario }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_SCENARIO:-}" ]]; then
            scenario="$INPUT_SCENARIO"
          elif [[ -n "${PR_NUMBER:-}" ]]; then
            # Ask the GitHub API which files this PR touches, then pick the
            # most-affected scenarios/<N>_<name>/ folder. Avoids any local
            # git history dependence.
            changed=$(gh pr view "$PR_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --json files --jq '.files[].path')
            scenario=$(echo "$changed" \
              | grep -oE '^scenarios/[0-9]+_[a-z_]+' \
              | sort | uniq -c | sort -rn | head -1 \
              | awk '{print $2}')
            scenario=${scenario:-scenarios/01_api_pr_update}
          else
            scenario=scenarios/01_api_pr_update
          fi

          case "$scenario" in
            scenarios/03_ui_workflow*) agent=ui_qa_agent ;;
            *)                         agent=api_qa_agent ;;
          esac

          echo "Picked scenario: $scenario (agent: $agent)"
          echo "path=$scenario"  >> "$GITHUB_OUTPUT"
          echo "agent=$agent"    >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------
      # Kick off the OpenHands conversation and block until it finishes.
      # Emits conversation_id, duration_seconds, cost_usd to $GITHUB_OUTPUT.
      # -----------------------------------------------------------------
      - name: Run QA conversation
        id: agent
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
          OPENHANDS_BASE_URL: https://app.all-hands.dev
          DEMO_REPO: ${{ github.repository }}
          DEMO_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          python -m agents.${{ steps.scenario.outputs.agent }} \
            --scenario "${{ steps.scenario.outputs.path }}" \
            --wait

      # -----------------------------------------------------------------
      # Pull every artifact the agent produced inside the sandbox.
      # -----------------------------------------------------------------
      - name: Fetch artifacts from sandbox
        id: fetch
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
          OPENHANDS_BASE_URL: https://app.all-hands.dev
        run: |
          python -m agents.fetch_artifacts "${{ steps.agent.outputs.conversation_id }}"
          ls -la "artifacts/${{ steps.agent.outputs.conversation_id }}"
          echo "path=artifacts/${{ steps.agent.outputs.conversation_id }}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------
      # UI scenarios only: build a small auto-playing GIF preview from
      # the first test video and commit it to the PR branch via the
      # Contents API. The raw URL goes into the PR comment so reviewers
      # see the workflow replay without opening the artifact bundle.
      # -----------------------------------------------------------------
      - name: Build GIF preview
        id: gif_build
        if: steps.scenario.outputs.agent == 'ui_qa_agent' && github.event_name == 'pull_request'
        # A GIF prep hiccup must never block the PR comment / artifact
        # upload that follow. continue-on-error lets the pipeline carry on
        # if ffmpeg fails or no video was produced.
        continue-on-error: true
        env:
          CONVERSATION_ID: ${{ steps.agent.outputs.conversation_id }}
          FETCH_PATH: ${{ steps.fetch.outputs.path }}
        run: |
          set -euo pipefail
          # Find the first video.webm in the fetched artifacts. The
          # Playwright config writes one per test under test-results/.
          video=$(find "$FETCH_PATH" -name 'video.webm' -type f 2>/dev/null | sort | head -1 || true)
          if [[ -z "$video" ]]; then
            echo "No video.webm found in $FETCH_PATH — skipping preview GIF."
            exit 0
          fi
          echo "Source video: $video"
          ls -lh "$video"

          # ffmpeg isn't on the default ubuntu-latest runner image any
          # more (removed in 2024). Install it; ~5 s.
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

          # 2-pass palette generation for clean low-size output:
          #   640px wide, 8fps, 10s max → ~1-1.5 MB.
          mkdir -p .qa-tmp
          ffmpeg -y -hide_banner -loglevel error -t 10 -i "$video" \
            -vf "fps=8,scale=640:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse" \
            ".qa-tmp/preview.gif"
          ls -lh .qa-tmp/preview.gif

          gif_repo_path="scenarios/03_ui_workflow/recordings/preview-${CONVERSATION_ID}.gif"
          {
            echo "gif_local=.qa-tmp/preview.gif"
            echo "gif_repo_path=$gif_repo_path"
            echo "has_gif=1"
          } >> "$GITHUB_OUTPUT"

      - name: Commit preview GIF to PR branch
        id: gif_commit
        # Fork PRs can't push to the head branch; skip gracefully there.
        # Also wrap in continue-on-error so a push failure doesn't sink
        # the whole workflow — we still want the PR comment + artifact.
        if: >-
          steps.gif_build.outputs.has_gif == '1'
          && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH:   ${{ github.head_ref }}
          REPO:     ${{ github.repository }}
        run: |
          set -euo pipefail
          gif_local='${{ steps.gif_build.outputs.gif_local }}'
          gif_repo_path='${{ steps.gif_build.outputs.gif_repo_path }}'

          # Base64-encode the GIF (no line wrapping) for the Contents API.
          content=$(base64 -w0 < "$gif_local")

          # Each conversation has a unique id so this is always a CREATE,
          # no need to look up an existing sha. [skip ci] in the commit
          # message prevents the push from re-triggering this workflow.
          resp=$(gh api -X PUT "/repos/$REPO/contents/$gif_repo_path" \
            -f message="ci(qa): preview GIF for ${{ steps.agent.outputs.conversation_id }} [skip ci]" \
            -f content="$content" \
            -f branch="$BRANCH")

          new_sha=$(echo "$resp" | jq -r '.commit.sha')
          echo "Committed $gif_repo_path on $BRANCH @ $new_sha"

          # Pin the URL to the new commit SHA so it survives branch deletion.
          raw_url="https://raw.githubusercontent.com/$REPO/$new_sha/$gif_repo_path"
          echo "raw_url=$raw_url" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------
      # Make the artifacts downloadable from the Actions tab.
      # -----------------------------------------------------------------
      - name: Upload artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: qa-${{ steps.agent.outputs.conversation_id }}
          path: ${{ steps.fetch.outputs.path }}
          if-no-files-found: warn
          retention-days: 30

      # -----------------------------------------------------------------
      # Post the result as a PR comment so reviewers see it inline.
      # No-op on workflow_dispatch (no PR context).
      # -----------------------------------------------------------------
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SCENARIO: ${{ steps.scenario.outputs.path }}
          CONVERSATION_URL: ${{ steps.agent.outputs.conversation_url }}
          DURATION: ${{ steps.agent.outputs.duration_seconds }}
          COST: ${{ steps.agent.outputs.cost_usd }}
          STATUS: ${{ steps.agent.outputs.execution_status }}
          ARTIFACT_NAME: qa-${{ steps.agent.outputs.conversation_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GIF_URL: ${{ steps.gif_commit.outputs.raw_url }}
        with:
          script: |
            const {
              SCENARIO, CONVERSATION_URL, DURATION, COST,
              STATUS, ARTIFACT_NAME, RUN_URL, GIF_URL,
            } = process.env;

            const mins = Math.floor(DURATION / 60);
            const secs = String(DURATION % 60).padStart(2, '0');
            const emoji = STATUS === 'finished' ? '✅' : '⚠️';

            const lines = [
              `${emoji} **Automated QA — \`${SCENARIO}\`**`,
              '',
              `| | |`,
              `|---|---|`,
              `| Status   | \`${STATUS}\` |`,
              `| Duration | ${mins}m ${secs}s |`,
              `| Cost     | $${COST} |`,
              `| Conversation | [${CONVERSATION_URL}](${CONVERSATION_URL}) |`,
              `| Artifacts | [\`${ARTIFACT_NAME}\`](${RUN_URL}#artifacts) |`,
            ];

            if (GIF_URL) {
              lines.push(
                '',
                '### 🎬 Workflow replay',
                '',
                `![Playwright run replay](${GIF_URL})`,
                '',
                `_First 10 seconds of the happy-path test, 640×360 / 8fps. Full-resolution \`.webm\` videos, Playwright traces, and the navigable HTML report are in the [artifact bundle](${RUN_URL}#artifacts)._`,
              );
            }

            lines.push(
              '',
              '_Generated by an AI agent (OpenHands) on this PR._',
            );

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join('\n'),
            });
